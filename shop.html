<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — UnoSignal Skate Store</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="js/onesignal.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="announcement">Free shipping on orders over <strong>£49.99</strong> — UK and EU</div>

  <header class="site-header">
    <div class="container">
      <button class="nav-toggle" aria-label="Open menu">☰</button>
      <a class="brand" href="index.html">
        <span class="brand-mark"><span>UNO</span></span>SIGNAL
      </a>
      <nav class="main-nav">
        <a href="shop.html">Skate</a>
        <a href="shop.html">Clothing</a>
        <a href="shop.html">Sale</a>
        <a href="about.html">About</a>
      </nav>
      <div class="header-actions">
        <a href="account.html" data-auth-link><span data-auth-name>Sign in</span></a>
        <a class="cart-link" href="cart.html">
          Cart <span class="cart-count" data-cart-count>0</span>
        </a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2>Shop everything</h2>
        <span class="muted">All products are demo data.</span>
      </div>

      <div class="filter-bar">
        <button class="active" data-filter="all">All</button>
        <button data-filter="decks">Decks</button>
        <button data-filter="completes">Completes</button>
        <button data-filter="clothing">Clothing</button>
        <button data-filter="accessories">Accessories</button>
      </div>

      <div class="product-grid" id="shop-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 UnoSignal Skate Co. Demo site.</span>
        <span>Powered by OneSignal</span>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
